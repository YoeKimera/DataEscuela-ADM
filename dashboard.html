<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataEscuela | Sistema</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --gh-bg: #0d1117;
      --gh-bg-soft: #161b22;
      --gh-card: #161b22;
      --gh-border: #30363d;
      --gh-text: #e6edf3;
      --gh-muted: #8b949e;
      --gh-accent: #2ea043;
      --gh-accent-soft: #238636;
    }

    body {
      background: radial-gradient(circle at 20% -10%, #1f2a3f 0%, var(--gh-bg) 35%);
      color: var(--gh-text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif;
      min-height: 100vh;
    }

    .gh-shell {
      border: 1px solid var(--gh-border);
      background: linear-gradient(180deg, #0d1117 0%, #0d1117 60%, #0f1520 100%);
      box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
    }

    .gh-card {
      border: 1px solid var(--gh-border);
      background: var(--gh-card);
      border-radius: 12px;
    }

    .gh-link {
      transition: 0.2s ease;
    }

    .gh-link:hover {
      color: #58a6ff;
    }

    .module-nav-item {
      transition: 0.2s ease;
    }

    .module-nav-item.active {
      background: #161b22;
      border-color: #58a6ff;
      color: #e6edf3;
    }

    .module-content-card {
      border: 1px solid var(--gh-border);
      background: var(--gh-card);
      border-radius: 12px;
    }
  </style>
</head>
<body class="p-4 md:p-6">
  <div class="max-w-7xl mx-auto gh-shell rounded-2xl overflow-hidden">
    <header class="border-b border-[#30363d] bg-[#161b22] px-4 md:px-6 py-3">
      <div class="flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 rounded-lg bg-[#238636] text-white grid place-items-center text-lg">
            <i class="fa-solid fa-school"></i>
          </div>
          <div>
            <h1 class="text-xl font-semibold tracking-tight">DataEscuela</h1>
            <p class="text-sm text-[#8b949e]">Jefatura Distrital 3</p>
          </div>
        </div>
        <div class="flex items-center gap-2 md:gap-3">
          <div class="text-right pr-2 border-r border-[#30363d]">
            <p id="userName" class="text-sm font-semibold">Usuario</p>
            <p id="userRole" class="text-xs text-[#8b949e]">user</p>
          </div>
          <button id="logoutBtn" class="px-3 py-2 text-sm rounded-md border border-[#30363d] hover:border-[#f85149] hover:text-[#f85149] transition">
            <i class="fa-solid fa-right-from-bracket mr-1"></i>Salir
          </button>
        </div>
      </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-[270px_1fr] min-h-[78vh]">
      <aside class="border-r border-[#30363d] p-4 md:p-5 bg-[#0d1117]">
        <p class="text-xs uppercase tracking-[0.16em] text-[#8b949e] mb-3">Navegación</p>
        <nav id="moduleNav" class="space-y-2 mb-6">
          <button data-module="inicio" class="module-nav-item gh-link w-full text-left flex items-center gap-2 px-3 py-2 rounded-md border border-[#30363d] text-sm font-medium">
            <i class="fa-solid fa-gauge-high text-[#2ea043]"></i>Inicio
          </button>
          <button data-module="ficha-escuelas" class="module-nav-item gh-link w-full text-left flex items-center gap-2 px-3 py-2 rounded-md border border-[#30363d] text-sm">
            <i class="fa-solid fa-building-columns text-[#58a6ff]"></i>Ficha de Escuelas
          </button>
          <div class="flex items-center gap-2 px-3 py-2 rounded-md border border-[#30363d] text-sm text-[#8b949e]">
            <i class="fa-solid fa-calendar-check"></i>Agenda (próximamente)
          </div>
          <div class="flex items-center gap-2 px-3 py-2 rounded-md border border-[#30363d] text-sm text-[#8b949e]">
            <i class="fa-solid fa-chart-line"></i>Reportes (próximamente)
          </div>
        </nav>

        <div class="gh-card p-4">
          <p class="text-xs uppercase tracking-[0.12em] text-[#8b949e] mb-2">Estado del sistema</p>
          <p class="text-sm mb-2">API</p>
          <span id="apiStatus" class="inline-flex items-center gap-2 text-xs px-2 py-1 rounded-full border border-[#2ea043] text-[#2ea043] bg-[#2ea0431a]">
            <span class="w-2 h-2 rounded-full bg-[#2ea043]"></span>Conectada
          </span>
          <p class="text-xs text-[#8b949e] mt-3">Última revisión: <span id="statusTime">--:--</span></p>
        </div>
      </aside>

      <main class="p-4 md:p-6 space-y-4">
        <section class="module-content-card p-4 md:p-5">
          <p id="moduleTag" class="text-xs uppercase tracking-[0.14em] text-[#8b949e] mb-2">Módulo</p>
          <h2 id="moduleTitle" class="text-2xl md:text-3xl font-semibold tracking-tight mb-2">Cargando...</h2>
          <p id="moduleSubtitle" class="text-sm text-[#8b949e] max-w-3xl">Inicializando módulo</p>
        </section>

        <section id="moduleContent" class="space-y-4"></section>
      </main>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="dashboard-app.js"></script>
</body>
</html>
