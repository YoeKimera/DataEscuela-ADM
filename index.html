<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DataEscuela - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo / Header -->
    <div class="text-center mb-8">
      <div class="inline-block bg-green-500 rounded-full p-4 mb-4">
        <i class="fas fa-school text-2xl text-white"></i>
      </div>
      <h1 class="text-3xl font-bold text-white mb-2">DataEscuela</h1>
      <p class="text-sky-300">Jefatura Distrital 3 - La Matanza</p>
    </div>

    <!-- Login Card -->
    <div class="bg-slate-800 rounded-lg shadow-2xl border border-slate-700 p-8">
      <h2 class="text-xl font-bold text-white mb-6 text-center">Ingreso al Sistema</h2>

      <!-- Error Message -->
      <div id="errorMessage" class="hidden mb-4 p-4 bg-red-900 border border-red-700 rounded text-red-200 text-sm">
        <i class="fas fa-exclamation-circle mr-2"></i>
        <span id="errorText"></span>
      </div>

      <!-- Success Message -->
      <div id="successMessage" class="hidden mb-4 p-4 bg-green-900 border border-green-700 rounded text-green-200 text-sm">
        <i class="fas fa-check-circle mr-2"></i>
        <span id="successText"></span>
      </div>

      <!-- Form -->
      <form id="loginForm" class="space-y-4">
        <!-- Email Field -->
        <div>
          <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
            <i class="fas fa-envelope mr-2"></i>Email
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="usuario@example.com"
            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-gray-400 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 transition"
            required
          >
        </div>

        <!-- PIN Field -->
        <div>
          <label for="pin" class="block text-sm font-medium text-gray-300 mb-2">
            <i class="fas fa-lock mr-2"></i>PIN
          </label>
          <input
            type="password"
            id="pin"
            name="pin"
            placeholder="••••••"
            class="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded text-white placeholder-gray-400 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 transition"
            required
          >
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          id="submitBtn"
          class="w-full py-2 px-4 bg-gradient-to-r from-green-500 to-green-600 text-white font-semibold rounded hover:from-green-600 hover:to-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-opacity-50 transition flex items-center justify-center gap-2"
        >
          <i class="fas fa-sign-in-alt"></i>
          <span id="submitText">Ingresar</span>
        </button>
      </form>

      <!-- Help Text -->
      <p class="text-xs text-gray-400 text-center mt-6">
        <i class="fas fa-info-circle mr-1"></i>
        Ingresa con tu email y PIN
      </p>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 text-gray-400 text-sm">
      <p>DataEscuela v1.0 - Sistema de Gestión Educativa</p>
    </div>
  </div>

  <!-- Scripts -->
  <script src="config.js"></script>
  <script src="login.js"></script>
</body>
</html>
